<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Status Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --red: #ef4444;
      --amber: #f59e0b;
      --green: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
    }
    .stat-card .label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; }
    .stat-card.overdue .value { color: var(--red); }
    .stat-card.due-today .value { color: var(--amber); }
    .stat-card.completed .value { color: var(--green); }
    .stat-card.active .value { color: var(--accent); }

    .section { margin-bottom: 2rem; }
    .section h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; }

    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 0.75rem; overflow: hidden; }
    th { background: #0f172a; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; text-align: left; padding: 0.75rem 1rem; }
    td { padding: 0.75rem 1rem; border-top: 1px solid var(--border); font-size: 0.875rem; }
    tr:hover td { background: rgba(59, 130, 246, 0.05); }

    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-overdue { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .badge-due { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
    .badge-email { background: rgba(59, 130, 246, 0.15); color: var(--accent); }
    .badge-call { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .badge-sms { background: rgba(168, 85, 247, 0.15); color: #a855f7; }

    .loading { color: var(--muted); font-style: italic; padding: 2rem; text-align: center; }
    .error { color: var(--red); padding: 1rem; background: rgba(239,68,68,0.1); border-radius: 0.5rem; }
    .lead-row { cursor: pointer; }
    .lead-row:hover td { background: rgba(59, 130, 246, 0.1); }
    .status-NEW { background: rgba(59, 130, 246, 0.15); color: var(--accent); }
    .status-CONTACTED { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
    .status-QUALIFIED { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .status-DISQUALIFIED { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .status-CONVERTED { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .follow-up-set { background: rgba(34, 197, 94, 0.15); color: var(--green); padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; }
    .follow-up-none { color: var(--muted); font-size: 0.75rem; }
    .modal-field { margin-bottom: 0.75rem; }
    .modal-field label { display: block; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .modal-field .val { font-size: 0.875rem; }
    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .refresh-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .refresh-btn:hover { opacity: 0.9; }
    .last-updated { color: var(--muted); font-size: 0.75rem; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.25rem;">
    <h1>CRM Status Dashboard</h1>
    <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
    <span class="last-updated" id="lastUpdated"></span>
  </div>
  <p class="subtitle">Coaching Season CRM — Cadence & Lead Overview</p>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card active"><div class="label">Active Enrollments</div><div class="value" id="activeEnrollments">—</div></div>
    <div class="stat-card overdue"><div class="label">Overdue Tasks</div><div class="value" id="overdueCount">—</div></div>
    <div class="stat-card due-today"><div class="label">Due Today</div><div class="value" id="dueTodayCount">—</div></div>
    <div class="stat-card completed"><div class="label">Completed Today</div><div class="value" id="tasksCompletedToday">—</div></div>
    <div class="stat-card"><div class="label">Active Cadences</div><div class="value" id="activeCadences">—</div></div>
    <div class="stat-card"><div class="label">Total Leads</div><div class="value" id="totalLeads">—</div></div>
  </div>

  <div class="section">
    <h2>Overdue Tasks</h2>
    <div id="overdueTable"><div class="loading">Loading…</div></div>
  </div>

  <div class="section">
    <h2>Due Today</h2>
    <div id="dueTodayTable"><div class="loading">Loading…</div></div>
  </div>

  <div class="section">
    <h2>Leads</h2>
    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;align-items:center">
      <input type="text" id="leadSearch" placeholder="Search leads…" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.5rem 0.75rem;border-radius:0.5rem;font-size:0.875rem;width:240px" />
      <select id="leadStatusFilter" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.5rem 0.75rem;border-radius:0.5rem;font-size:0.875rem">
        <option value="">All Statuses</option>
        <option value="NEW">New</option>
        <option value="CONTACTED">Contacted</option>
        <option value="QUALIFIED">Qualified</option>
        <option value="DISQUALIFIED">Disqualified</option>
        <option value="CONVERTED">Converted</option>
      </select>
      <button class="refresh-btn" onclick="loadLeads()">Filter</button>
    </div>
    <div id="leadsTable"><div class="loading">Loading…</div></div>
  </div>

  <!-- Lead Detail Modal -->
  <div id="leadModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;justify-content:center;align-items:center">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:0.75rem;padding:1.5rem;width:min(560px,90vw);max-height:85vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2 id="modalTitle" style="font-size:1.125rem">Lead Detail</h2>
        <button onclick="closeLeadModal()" style="background:none;border:none;color:var(--muted);font-size:1.25rem;cursor:pointer">✕</button>
      </div>
      <div id="modalBody">Loading…</div>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    function renderTaskTable(items, containerId) {
      const container = document.getElementById(containerId);
      if (!items || items.length === 0) {
        container.innerHTML = '<div class="loading">No tasks</div>';
        return;
      }
      const rows = items.map(t => `
        <tr>
          <td>${esc(t.title)}</td>
          <td>${esc(t.contactName || '—')}</td>
          <td>${esc(t.cadenceName || '—')}</td>
          <td><span class="badge badge-${channelClass(t.channel)}">${esc(t.channel)}</span></td>
          <td>${formatDate(t.dueAt)}</td>
          <td>${t.hoursOverdue > 0 ? `<span class="badge badge-overdue">${t.hoursOverdue}h overdue</span>` : ''}</td>
          <td>
            <button class="refresh-btn" style="padding:0.25rem 0.5rem;font-size:0.75rem" onclick="completeTask('${t.id}')">✓ Done</button>
            <button class="refresh-btn" style="padding:0.25rem 0.5rem;font-size:0.75rem;background:var(--border)" onclick="skipTask('${t.id}')">Skip</button>
          </td>
        </tr>
      `).join('');
      container.innerHTML = `
        <table>
          <thead><tr><th>Task</th><th>Contact</th><th>Cadence</th><th>Channel</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function channelClass(ch) { return ({ EMAIL: 'email', CALL: 'call', SMS: 'sms', LINKEDIN: 'email' })[ch] || 'email'; }
    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
             d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    async function loadDashboard() {
      try {
        const [statsRes, overdueRes, dueTodayRes, leadsRes] = await Promise.all([
          fetch(`${API}/api/stats`).then(r => r.json()),
          fetch(`${API}/api/tasks/overdue`).then(r => r.json()),
          fetch(`${API}/api/tasks/due-today`).then(r => r.json()),
          fetch(`${API}/api/leads?limit=0`).then(r => r.json()).catch(() => ({ total: '—' })),
        ]);

        document.getElementById('activeEnrollments').textContent = statsRes.activeEnrollments ?? '—';
        document.getElementById('overdueCount').textContent = statsRes.overdueCount ?? '—';
        document.getElementById('dueTodayCount').textContent = statsRes.dueTodayCount ?? '—';
        document.getElementById('tasksCompletedToday').textContent = statsRes.tasksCompletedToday ?? '—';
        document.getElementById('activeCadences').textContent = statsRes.activeCadences ?? '—';
        document.getElementById('totalLeads').textContent = leadsRes.total ?? '—';

        renderTaskTable(overdueRes.items, 'overdueTable');
        renderTaskTable(dueTodayRes.items, 'dueTodayTable');

        document.getElementById('lastUpdated').textContent = `Updated ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        console.error('Dashboard load error:', err);
      }
    }

    async function completeTask(id) {
      await fetch(`${API}/api/tasks/${id}/complete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      loadDashboard();
    }

    async function skipTask(id) {
      await fetch(`${API}/api/tasks/${id}/skip`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      loadDashboard();
    }

    // ── Leads ─────────────────────────────────────────

    async function loadLeads() {
      try {
        const search = document.getElementById('leadSearch').value;
        const status = document.getElementById('leadStatusFilter').value;
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (status) params.set('status', status);
        params.set('limit', '50');
        const res = await fetch(`${API}/api/leads?${params}`);
        const data = await res.json();
        renderLeadsTable(data.items || []);
      } catch (err) {
        console.error('Load leads error:', err);
      }
    }

    function renderLeadsTable(leads) {
      const container = document.getElementById('leadsTable');
      if (!leads || leads.length === 0) {
        container.innerHTML = '<div class="loading">No leads found</div>';
        return;
      }
      const rows = leads.map(l => `
        <tr class="lead-row" onclick="openLeadDetail('${l.id}')">
          <td style="font-weight:500">${esc(l.name)}</td>
          <td>${esc(l.company || '—')}</td>
          <td>${esc(l.email || '—')}</td>
          <td><span class="badge status-${l.status}">${esc(l.status)}</span></td>
          <td>${l.followUpAt
            ? `<span class="follow-up-set">${formatDate(l.followUpAt)}</span>`
            : '<span class="follow-up-none">None</span>'}
          </td>
          <td>${esc(l.leadSource || '—')}</td>
        </tr>
      `).join('');
      container.innerHTML = `
        <table>
          <thead><tr><th>Name</th><th>Company</th><th>Email</th><th>Status</th><th>Follow-Up</th><th>Source</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // ── Lead Detail Modal ──────────────────────────────

    let currentLeadId = null;

    async function openLeadDetail(id) {
      currentLeadId = id;
      document.getElementById('leadModal').style.display = 'flex';
      document.getElementById('modalBody').innerHTML = '<div class="loading">Loading…</div>';
      try {
        const res = await fetch(`${API}/api/leads/${id}`);
        if (!res.ok) throw new Error('Not found');
        const lead = await res.json();
        renderLeadModal(lead);
      } catch (err) {
        document.getElementById('modalBody').innerHTML = '<div class="error">Failed to load lead</div>';
      }
    }

    function closeLeadModal() {
      document.getElementById('leadModal').style.display = 'none';
      currentLeadId = null;
    }

    // Close modal on backdrop click
    document.getElementById('leadModal').addEventListener('click', function(e) {
      if (e.target === this) closeLeadModal();
    });

    function renderLeadModal(lead) {
      document.getElementById('modalTitle').textContent = lead.name;
      const followUpValue = lead.followUpAt ? new Date(lead.followUpAt).toISOString().slice(0, 16) : '';
      const transitions = {
        NEW: ['CONTACTED', 'DISQUALIFIED'],
        CONTACTED: ['QUALIFIED', 'DISQUALIFIED'],
        QUALIFIED: ['CONVERTED', 'DISQUALIFIED'],
        DISQUALIFIED: [],
        CONVERTED: [],
      };
      const nextStatuses = transitions[lead.status] || [];

      const statusButtons = nextStatuses.map(s =>
        `<button class="refresh-btn" style="padding:0.375rem 0.75rem;font-size:0.8125rem" onclick="transitionStatus('${lead.id}','${s}')">→ ${s.charAt(0)+s.slice(1).toLowerCase()}</button>`
      ).join('');

      const activities = (lead.activities || []).slice(0, 10).map(a =>
        `<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.8125rem">
          <span class="badge badge-${channelClass(a.type)}" style="margin-right:0.5rem">${esc(a.type)}</span>
          <strong>${esc(a.subject || '(no subject)')}</strong>
          <span style="color:var(--muted);margin-left:0.5rem">${formatDate(a.createdAt)}</span>
          ${a.body ? `<div style="color:var(--muted);margin-top:0.25rem">${esc(a.body)}</div>` : ''}
        </div>`
      ).join('');

      document.getElementById('modalBody').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem">
          <div class="modal-field"><label>Email</label><div class="val">${esc(lead.email || '—')}</div></div>
          <div class="modal-field"><label>Phone</label><div class="val">${esc(lead.phone || '—')}</div></div>
          <div class="modal-field"><label>Company</label><div class="val">${esc(lead.company || '—')}</div></div>
          <div class="modal-field"><label>Source</label><div class="val" id="sourceDisplay">${esc(lead.leadSource || '—')}${lead.leadSourceDetail ? ` / ${esc(lead.leadSourceDetail)}` : ''} <a href="#" onclick="toggleSourceEdit();return false" style="color:var(--accent);font-size:0.75rem">edit</a></div></div>
          <div class="modal-field"><label>Status</label><div class="val"><span class="badge status-${lead.status}">${esc(lead.status)}</span></div></div>
          <div class="modal-field"><label>Owner</label><div class="val">${esc(lead.ownerId || '—')}</div></div>
        </div>
        ${lead.notes ? `<div class="modal-field"><label>Notes</label><div class="val">${esc(lead.notes)}</div></div>` : ''}

        <div id="sourceEdit" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:0.5rem;padding:1rem;margin:0.75rem 0">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
            <div class="modal-field">
              <label>Lead Source</label>
              <select id="sourceInput" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:0.5rem;font-size:0.875rem;width:100%">
                <option value="">(none)</option>
                <option value="REFERRAL" ${lead.leadSource==='REFERRAL'?'selected':''}>Referral</option>
                <option value="INBOUND" ${lead.leadSource==='INBOUND'?'selected':''}>Inbound</option>
                <option value="OUTBOUND" ${lead.leadSource==='OUTBOUND'?'selected':''}>Outbound</option>
              </select>
            </div>
            <div class="modal-field">
              <label>Source Detail</label>
              <select id="sourceDetailInput" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:0.5rem;font-size:0.875rem;width:100%">
                <option value="">(none)</option>
                <option value="WARN_TRIGGER" ${lead.leadSourceDetail==='WARN_TRIGGER'?'selected':''}>WARN Trigger</option>
                <option value="LINKEDIN_ICP_MATCH" ${lead.leadSourceDetail==='LINKEDIN_ICP_MATCH'?'selected':''}>LinkedIn ICP Match</option>
                <option value="REFERRAL_INTRODUCTION" ${lead.leadSourceDetail==='REFERRAL_INTRODUCTION'?'selected':''}>Referral Introduction</option>
                <option value="WORD_OF_MOUTH" ${lead.leadSourceDetail==='WORD_OF_MOUTH'?'selected':''}>Word of Mouth</option>
                <option value="SILENT_REFERRAL" ${lead.leadSourceDetail==='SILENT_REFERRAL'?'selected':''}>Silent Referral</option>
                <option value="EVENT" ${lead.leadSourceDetail==='EVENT'?'selected':''}>Event</option>
                <option value="WEBSITE_CONTENT" ${lead.leadSourceDetail==='WEBSITE_CONTENT'?'selected':''}>Website/Content</option>
                <option value="OTHER" ${lead.leadSourceDetail==='OTHER'?'selected':''}>Other</option>
              </select>
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
            <button class="refresh-btn" style="padding:0.375rem 0.75rem;font-size:0.8125rem" onclick="saveSource('${lead.id}')">Save Source</button>
            <button class="refresh-btn" style="padding:0.375rem 0.75rem;font-size:0.8125rem;background:var(--border);color:var(--text)" onclick="toggleSourceEdit()">Cancel</button>
          </div>
        </div>

        <div style="background:var(--bg);border:1px solid var(--border);border-radius:0.5rem;padding:1rem;margin:1rem 0">
          <label style="display:block;color:var(--muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem">Follow-Up Date</label>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <input type="datetime-local" id="followUpInput" value="${followUpValue}"
              style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:0.5rem;font-size:0.875rem" />
            <button class="refresh-btn" style="padding:0.5rem 0.75rem" onclick="saveFollowUp('${lead.id}')">Save</button>
            ${lead.followUpAt ? `<button class="refresh-btn" style="padding:0.5rem 0.75rem;background:var(--border);color:var(--text)" onclick="clearFollowUp('${lead.id}')">Clear</button>` : ''}
          </div>
          ${lead.followUpAt ? `<div style="margin-top:0.5rem;font-size:0.8125rem;color:var(--green)">✓ Follow-up set — cadence task will be created/updated</div>` : ''}
        </div>

        ${statusButtons ? `<div class="modal-actions"><span style="color:var(--muted);font-size:0.8125rem;line-height:2">Transition:</span>${statusButtons}</div>` : ''}

        <div style="margin-top:1.25rem">
          <h3 style="font-size:0.9375rem;margin-bottom:0.75rem">Recent Activity</h3>
          ${activities || '<div class="loading">No activity</div>'}
        </div>
      `;
    }

    async function saveFollowUp(id) {
      const input = document.getElementById('followUpInput').value;
      if (!input) return;
      const date = new Date(input).toISOString();
      await fetch(`${API}/api/leads/${id}/follow-up`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ followUpAt: date }),
      });
      openLeadDetail(id);
      loadLeads();
      loadDashboard();
    }

    async function clearFollowUp(id) {
      await fetch(`${API}/api/leads/${id}/follow-up`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ followUpAt: null }),
      });
      openLeadDetail(id);
      loadLeads();
      loadDashboard();
    }

    async function transitionStatus(id, status) {
      await fetch(`${API}/api/leads/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      openLeadDetail(id);
      loadLeads();
    }

    // ── Source edit ──────────────────────────────────────

    function toggleSourceEdit() {
      const el = document.getElementById('sourceEdit');
      if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function saveSource(id) {
      const source = document.getElementById('sourceInput').value || null;
      const detail = document.getElementById('sourceDetailInput').value || null;
      await fetch(`${API}/api/leads/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ leadSource: source, leadSourceDetail: detail }),
      });
      openLeadDetail(id);
      loadLeads();
    }

    // Debounced search
    let searchTimeout;
    document.getElementById('leadSearch').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(loadLeads, 300);
    });

    loadDashboard();
    loadLeads();
    // Auto-refresh every 60 seconds
    setInterval(loadDashboard, 60000);
  </script>
</body>
</html>
